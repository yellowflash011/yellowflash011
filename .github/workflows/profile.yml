name: Refresh profile card

on:
  schedule:
    - cron: "0 3 * * *"      # daily at 03:00 UTC
  push:
    branches: [main]
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # allow the job to commit the regenerated SVGs

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate SVGs
        env:
          # Built-in token — enough for repos, stars, followers and commit counts.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark.svg light.svg
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh profile stats"
            git push
          fi
